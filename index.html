<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Medical Reminder</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-container">

  <div class="card">

    <!-- LEFT PANEL -->
    <div class="left-panel">
      <h2>Smart Medical Reminder</h2>

      <div class="image-box">
        <img src="doctor.jpg" alt="Doctor" class="doctor-img">
        <p class="image-caption">Never miss a dose</p>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">

      <!-- BRAND -->
      <div class="brand-header">
        <div class="logo">
          <img src="dosecarelogo.png" alt="DoseCare Logo">
        </div>
        <h2 class="brand-name">DoseCare</h2>
      </div>

      <input type="email" placeholder="Email">
      <input type="password" placeholder="Password">

      <button class="login-btn">Login</button>

      <p class="signup-text">
        Don't have an account? <a href="#">Sign up</a>
      </p>

    </div>

  </div>

</div>

</body>
</html>
